<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 温暖金棕渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4A572"/>
      <stop offset="50%" stop-color="#B8956A"/>
      <stop offset="100%" stop-color="#A07850"/>
    </linearGradient>
    <!-- 内部微光渐变 -->
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- 阴影滤镜 -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(26,42,58,0.15)"/>
    </filter>
  </defs>

  <!-- 外圆背景 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" filter="url(#softShadow)"/>

  <!-- 内圆微光层，增加温暖感 -->
  <circle cx="256" cy="256" r="200" fill="url(#glowGradient)"/>

  <!-- 对话气泡主体 -->
  <path d="M156 186
           C156 160 176 140 202 140
           L310 140
           C336 140 356 160 356 186
           L356 290
           C356 316 336 336 310 336
           L280 336
           L256 372
           L232 336
           L202 336
           C176 336 156 316 156 290
           Z"
        fill="#FAF8F3"
        opacity="0.95"/>

  <!-- 气泡内横线：模拟言语/文字的痕迹 -->
  <rect x="196" y="200" width="120" height="8" rx="4" fill="#B8956A" opacity="0.7"/>
  <rect x="196" y="232" width="90" height="8" rx="4" fill="#B8956A" opacity="0.5"/>
  <rect x="196" y="264" width="70" height="8" rx="4" fill="#B8956A" opacity="0.35"/>

  <!-- 四角星光：代表未尽之言的珍贵光芒 -->
  <g transform="translate(326, 170)">
    <!-- 垂直光芒 -->
    <ellipse cx="0" cy="0" rx="3.5" ry="14" fill="#F5F0E8"/>
    <!-- 水平光芒 -->
    <ellipse cx="0" cy="0" rx="14" ry="3.5" fill="#F5F0E8"/>
    <!-- 中心亮点 -->
    <circle cx="0" cy="0" r="5" fill="#FFF"/>
  </g>
</svg>